<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unlimit Search - Results</title>
  <link rel="icon" type="image/png" href="Logo.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="results-top-search" role="search" aria-label="Search results">
    <div class="results-top-inner">
      <div class="results-top-left">
        <a class="top-back-link" href="index.html" aria-label="New search">←</a>
        <div class="results-top-brand">
          <img class="site-logo small" src="Logo.png" alt="Unlimit Search logo" />
          <h1 class="brand small">Unlimit Search</h1>
        </div>
      </div>

      <form id="results-top-form" class="results-top-form">
        <label class="sr-only" for="results-top-query">Search query</label>
        <div class="results-top-input-wrap">
          <input
            id="results-top-query"
            class="results-top-input"
            type="search"
            name="q"
            placeholder="Search the web"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="results-top-btn" type="submit" aria-label="Search">
            <img class="btn-search-icon-img" src="Search.png" alt="" aria-hidden="true" />
          </button>
        </div>
      </form>

      <div class="results-top-actions">
        <button class="ai-mode-btn" type="button" data-ai-mode-toggle="true" aria-pressed="false">AI Mode</button>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
          Toggle theme
        </button>
      </div>
    </div>
  </div>

  <main class="container results-page">
    <section class="results-context" aria-label="Current Query">
      <p class="context-label">Showing results for</p>
      <h2 id="results-query" class="results-query">your latest query</h2>
    </section>

    <section class="results-main-grid" aria-label="Results Content">
      <div class="results-main-column">
        <section class="search-card" aria-label="Search Results">
          <script async src="https://cse.google.com/cse.js?cx=005f19c66e75044b5"></script>
          <div class="gcse-searchresults-only"></div>
        </section>
      </div>

      <aside class="results-side-column" aria-label="Generated and Recent Content">
        <section id="ai-answer-panel" class="panel hidden" aria-label="AI Answer">
          <div class="panel-header">
            <h2>AI Answer</h2>
          </div>
          <p id="ai-answer-status" class="empty-state">Preparing AI response...</p>
          <div id="ai-answer-content" class="ai-answer-content"></div>
        </section>

        <section class="panel" aria-label="Recent Searches">
          <div class="panel-header">
            <h2>Recent Searches</h2>
            <button id="clear-history" class="clear-btn" type="button">Clear</button>
          </div>
          <div id="recent-searches" class="recent-list" aria-live="polite"></div>
        </section>
      </aside>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
