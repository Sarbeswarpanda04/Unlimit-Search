<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unlimit Search</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1 class="brand">Unlimit Search</h1>
    <p class="tagline">Google-powered custom search</p>

    <section class="search-card" aria-label="Search">
      <script async src="https://cse.google.com/cse.js?cx=005f19c66e75044b5"></script>
      <div
        class="gcse-searchbox-only"
        data-resultsUrl="results.html"
        data-newWindow="false"
      ></div>
    </section>

    <p class="hint">
      Search results open on
      <a href="results.html">results.html</a>
    </p>
  </main>

  <script src="script.js"></script>
</body>
</html>
